<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Jobs Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Creative Jobs</h1>
      <span class="badge-new" id="badge-new" title="New jobs fetched today"></span>
    </div>
    <div class="header-right">
      <span class="last-fetch" id="last-fetch">Loading…</span>
      <button class="btn btn-fetch" id="btn-fetch" title="Trigger a new scrape now">
        &circlearrowright; Sync Now
      </button>
    </div>
  </header>

  <!-- Filters -->
  <div class="filters">
    <input
      type="search"
      id="filter-q"
      class="filter-input"
      placeholder="Search roles, studios, or keywords…"
      autocomplete="off"
    />
    <select id="filter-source" class="filter-select">
      <option value="">All Platforms</option>
    </select>
    <select id="filter-date" class="filter-select">
      <option value="">Any Time</option>
      <option value="today">Today</option>
      <option value="week">Past Week</option>
      <option value="month">Past Month</option>
    </select>
    <label class="filter-fav">
      <input type="checkbox" id="filter-favs" />
      <span>&starf; Favorites</span>
    </label>
  </div>

  <!-- Job list -->
  <main class="job-list" id="job-list">
    <div class="loading" id="loading">Gathering opportunities…</div>
  </main>

  <!-- Load more -->
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="btn btn-load-more" id="btn-load-more">Show More</button>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="empty-state" style="display:none">
    <p>No matches found. Try a different search or refine your filters.</p>
  </div>

  <!-- Fetch toast -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
